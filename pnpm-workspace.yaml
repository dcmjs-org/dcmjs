# pnpm 11+ requires an explicit decision for dependencies with install scripts (see allowBuilds).
packages:
  - "."

# https://pnpm.io/supply-chain-security — transitive deps may not use git/tarball sources.
blockExoticSubdeps: true

# https://pnpm.io/supply-chain-security — only install releases at least this many minutes old;
# strict: fail resolution if no version in range satisfies the age rule (no silent fallback).
minimumReleaseAge: 1440
minimumReleaseAgeStrict: true

# https://pnpm.io/supply-chain-security — block installs when npm trust signals regress vs older releases.
# Excludes match package.json pnpm.overrides pins that predate provenance / publisher metadata on those versions.
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver
  - serialize-javascript@7.0.3
  - "@babel/traverse@7.28.6"
  - lodash@4.18.1
  - flatted@3.4.2
  - picomatch@2.3.2
  - minimatch@3.1.5

allowBuilds:
  core-js-pure: false
